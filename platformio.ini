[env]
platform  = espressif32
board     = adafruit_feather_esp32c6
framework = arduino

monitor_speed   = 115200
upload_port     = /dev/cu.usbmodem2101
monitor_port    = /dev/cu.usbmodem2101
monitor_filters = esp32_exception_decoder
upload_speed    = 921600
upload_protocol = esptool
board_upload.use_1200bps_touch = yes

; USB-CDC serial (built-in on ESP32-C6)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:adafruit_feather_esp32c6]
lib_deps =
    bblanchon/ArduinoJson@^7.3.0

[env:fsr_test]
build_src_filter = -<*> +<../test_fsr/main.cpp>

[env:weight_test]
build_src_filter = -<*> +<../test_weight/main.cpp>

[env:nau_test]
build_src_filter = -<*> +<../test_nau/main.cpp>
lib_deps =
    adafruit/Adafruit NAU7802 Library@^1.0.0

; Same sketch, flashed over WiFi — no cable needed once it's running.
[env:nau_test_ota]
extends         = env:nau_test
upload_protocol = espota
upload_port     = hydracoaster.local
upload_flags    = --timeout=30

; Product firmware: NAU7802 -> lib/brain -> BLE GATT (docs/ble-protocol.md).
; Builds src/ (the default build_src_filter) — BLE only, no WiFi symbols.
[env:hydra]
; NimBLE + WiFi/OTA + sensor libs don't fit the board's default 1.25 MB app
; slot; no_fs.csv drops the unused SPIFFS partition for ~1.9 MB per OTA slot.
board_build.partitions = no_fs.csv
lib_deps =
    adafruit/Adafruit NAU7802 Library@^1.0.0
    h2zero/NimBLE-Arduino@^2.2.0
    adafruit/Adafruit MAX1704X@^1.0.3

; Same product sketch, WiFi + ArduinoOTA added for bench reflashing without a
; cable. BLE and WiFi coexist fine on the C6.
[env:hydra_ota]
extends         = env:hydra
build_flags     =
    ${env.build_flags}
    -DHYDRA_WIFI_OTA
upload_protocol = espota
upload_port     = hydracoaster.local
upload_flags    = --timeout=30

; Native unit tests for lib/brain (pure C++, no hardware). Overrides the
; [env] defaults that don't apply off-target so it doesn't inherit the
; ESP32 board/framework/build flags above.
[env:native]
platform    = native
board       = native
framework   =
build_flags = -std=c++17
