name: HydraCoaster
options:
  bundleIdPrefix: com.ronav
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  HydraCoaster:
    type: application
    platform: iOS
    sources:
      - path: HydraCoaster
    info:
      path: HydraCoaster/Info.plist
      properties:
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: "HydraCoaster uses Bluetooth to connect to your coaster and track your sips."
        UIBackgroundModes:
          - bluetooth-central
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronav.HydraCoaster
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - HydraCoasterTests
      gatherCoverageData: true
  HydraCoasterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HydraCoasterTests
    dependencies:
      - target: HydraCoaster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronav.HydraCoasterTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HydraCoaster.app/HydraCoaster"
        BUNDLE_LOADER: "$(TEST_HOST)"
