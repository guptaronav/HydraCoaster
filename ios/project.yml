name: HydraCoaster
options:
  bundleIdPrefix: com.ronav
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  HydraCoaster:
    type: application
    platform: iOS
    sources:
      - path: HydraCoaster
    info:
      path: HydraCoaster/Info.plist
      properties:
        CFBundleShortVersionString: "3.0"
        CFBundleVersion: "3"
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: "HydraCoaster uses Bluetooth to connect to your coaster and track your sips."
        NSHealthUpdateUsageDescription: "HydraCoaster logs each sip as water intake in Health."
        NSHealthShareUsageDescription: "HydraCoaster reads your sleep schedule to figure out quiet hours automatically."
        UIBackgroundModes:
          - bluetooth-central
        OWMAPIKey: "$(OWM_API_KEY)"
        OWMLat: "$(OWM_LAT)"
        OWMLon: "$(OWM_LON)"
    entitlements:
      path: HydraCoaster/HydraCoaster.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.security.application-groups:
          - group.com.ronav.HydraCoaster
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronav.HydraCoaster
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LPU8C59HD4
    dependencies:
      - target: HydraWidgetExtension
        embed: true
    scheme:
      testTargets:
        - HydraCoasterTests
      gatherCoverageData: true
  HydraWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: HydraWidget
      - path: HydraCoaster/Theme/Theme.swift
      - path: HydraCoaster/Theme/WidgetState.swift
    info:
      path: HydraWidget/Info.plist
      properties:
        CFBundleShortVersionString: "3.0"
        CFBundleVersion: "3"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HydraWidget/HydraWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.ronav.HydraCoaster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronav.HydraCoaster.Widgets
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LPU8C59HD4
  HydraCoasterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HydraCoasterTests
    dependencies:
      - target: HydraCoaster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronav.HydraCoasterTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HydraCoaster.app/HydraCoaster"
        BUNDLE_LOADER: "$(TEST_HOST)"
