name: HydraCoaster
options:
  bundleIdPrefix: com.ronav
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  HydraCoaster:
    type: application
    platform: iOS
    sources:
      - path: HydraCoaster
    info:
      path: HydraCoaster/Info.plist
      properties:
        UILaunchScreen: {}
        NSBluetoothAlwaysUsageDescription: "HydraCoaster uses Bluetooth to connect to your coaster and track your sips."
        NSHealthUpdateUsageDescription: "HydraCoaster logs each sip as water intake in Health."
        UIBackgroundModes:
          - bluetooth-central
        OWMAPIKey: "$(OWM_API_KEY)"
        OWMLat: "$(OWM_LAT)"
        OWMLon: "$(OWM_LON)"
    entitlements:
      path: HydraCoaster/HydraCoaster.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronav.HydraCoaster
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets:
        - HydraCoasterTests
      gatherCoverageData: true
  HydraCoasterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HydraCoasterTests
    dependencies:
      - target: HydraCoaster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ronav.HydraCoasterTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HydraCoaster.app/HydraCoaster"
        BUNDLE_LOADER: "$(TEST_HOST)"
